name: Deploy to cloudtype
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Connect deploy key
        uses: cloudtype-github-actions/connect@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          ghtoken: ${{ secrets.GHP_TOKEN }}
      - name: Deploy
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: topbanker99/jongno-labor
          stage: main
          yaml: >
            name: jongno-labor

            app: node@24

            options:
              ports: "3000"
              install: npm install
              start: node server.js
              env:
                - name: OPENAI_API_KEY
                  value: ${{ secrets.OPENAI_API_KEY }}
                - name: LAW_OC
                  value: dlthf87
                - name: SMTP_HOST
                  value: smtp.naver.com
                - name: SMTP_USER
                  value: topbanker99@naver.com
                - name: SMTP_PASS
                  value: ${{ secrets.SMTP_PASS }}
                - name: LAWYER_EMAIL
                  value: kkd@jnhrm.co.kr
                - name: RAG_NAMESPACE
                  value: nomusa
                - name: UPSTASH_VECTOR_URL
                  value: ${{ secrets.UPSTASH_VECTOR_URL }}
                - name: UPSTASH_VECTOR_TOKEN
                  value: ${{ secrets.UPSTASH_VECTOR_TOKEN }}
                - name: REALTIME_PW
                  value: ${{ secrets.REALTIME_PW }}
              buildenv: []
            context:
              git:
                url: git@github.com:${{ github.repository }}.git
                ref: ${{ github.ref }}
